name: society_management
description: "Multi-Society Management App — Role-based Flutter + Firebase MVP"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Firebase ───────────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.2.0
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.0.4

  # ── State Management ───────────────────────────────────────
  provider: ^6.1.2
  get: ^4.6.6


  # ── Navigation ─────────────────────────────────────────────
  # go_router removed as GetX is used

  # ── UI / UX ────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fluttertoast: ^8.2.8

  # ── Image / File Picker ────────────────────────────────────
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  path_provider: ^2.1.5

  # ── Local Storage / Session ────────────────────────────────
  shared_preferences: ^2.3.1

  # ── Utilities ──────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.2
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
